<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口頭試問 評価システム</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pri:#2e5d7d;--pri-l:#e3eef5;--pri-d:#1b3e57;
  --bg:#f5f7f9;--card:#fff;--txt:#1a1a1a;--sub:#666;--bdr:#e0e0e0;
  --s5:#1b8a2e;--s4:#4caf50;--s3:#f9a825;--s2:#ef6c00;--s1:#d32f2f;
  --rec:#d32f2f;
  --r:12px;--sh:0 2px 8px rgba(0,0,0,.08);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:var(--bg);color:var(--txt);line-height:1.6;min-height:100vh;padding-bottom:80px}

/* ヘッダー */
.hdr{background:var(--pri);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.hdr h1{font-size:1rem;font-weight:700;flex:1;text-align:center}
.lsw{display:flex;gap:2px;flex-shrink:0}
.lsw button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:4px 8px;border-radius:6px;font-size:.7rem;font-weight:700;cursor:pointer}
.lsw button.on{background:#fff;color:var(--pri);border-color:#fff}

/* タブ */
.tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid var(--bdr);z-index:100;box-shadow:0 -2px 6px rgba(0,0,0,.08)}
.tabs button{flex:1;padding:8px 2px;border:none;background:0;font-size:.65rem;color:var(--sub);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.tabs button svg{width:20px;height:20px;fill:currentColor}
.tabs button.on{color:var(--pri);font-weight:700}

/* ページ */
.pg{display:none;padding:16px;max-width:640px;margin:0 auto}
.pg.on{display:block}

/* カード共通 */
.cd{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}

/* メタ入力 */
.meta label{display:block;font-size:.85rem;font-weight:600;color:var(--sub);margin-bottom:4px}
.meta input{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:1rem;margin-bottom:12px;outline:0}
.meta input:focus{border-color:var(--pri)}
.meta input:last-child{margin-bottom:0}

/* セクション見出し */
.stit{font-size:.9rem;font-weight:700;color:var(--pri-d);padding:8px 0;margin-top:8px;border-bottom:2px solid var(--pri);margin-bottom:12px}

/* 試問カード */
.qc{border-left:4px solid var(--bdr);transition:border-color .3s}
.qc.done{border-left-color:var(--pri)}
.qc.scored{border-left-color:var(--s5)}
.qc .en{font-size:.75rem;font-weight:700;color:var(--pri);letter-spacing:.05em}
.qc .enm{font-size:1rem;font-weight:700;margin:4px 0}
.qc .ed{font-size:.85rem;color:var(--txt);margin-bottom:12px;line-height:1.6;background:var(--pri-l);padding:10px 12px;border-radius:8px}

/* 録音 */
.recrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.recbtn{display:flex;align-items:center;gap:8px;padding:10px 16px;border:2px solid var(--rec);border-radius:24px;background:#fff;color:var(--rec);font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s}
.recbtn:active{transform:scale(.96)}
.recbtn .dot{width:12px;height:12px;border-radius:50%;background:var(--rec)}
.recbtn.recording{background:var(--rec);color:#fff}
.recbtn.recording .dot{background:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rectime{font-size:.9rem;font-weight:700;color:var(--rec);font-variant-numeric:tabular-nums;min-width:48px}
.recstat{font-size:.8rem;color:var(--sub)}
.recstat.ok{color:var(--pri);font-weight:600}
audio{width:100%;margin:6px 0;height:40px}
.live{font-size:.82rem;color:var(--sub);background:#fafafa;border:1px dashed var(--bdr);border-radius:8px;padding:8px 10px;margin-top:6px;white-space:pre-wrap;min-height:20px}
.live .lbl{display:block;font-size:.7rem;font-weight:700;color:var(--pri);margin-bottom:2px}

/* 採点 */
.sr{display:flex;gap:6px;margin:10px 0}
.sb{flex:1;min-height:48px;border:2px solid var(--bdr);border-radius:10px;background:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .2s}
.sb .sl{font-size:.5rem;font-weight:400;color:var(--sub);line-height:1.1;text-align:center}
.sb:active{transform:scale(.95)}
.sb.sel{color:#fff;border-color:transparent}
.sb.sel .sl{color:rgba(255,255,255,.85)}
.sb[data-s="5"].sel{background:var(--s5)}
.sb[data-s="4"].sel{background:var(--s4)}
.sb[data-s="3"].sel{background:var(--s3)}
.sb[data-s="2"].sel{background:var(--s2)}
.sb[data-s="1"].sel{background:var(--s1)}
.tlbl{font-size:.78rem;font-weight:700;color:var(--pri-d);margin:10px 0 4px;display:flex;justify-content:space-between;align-items:center}
.qc textarea,.oata{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:.9rem;font-family:inherit;resize:vertical;min-height:60px;outline:0}
.qc textarea:focus,.oata:focus{border-color:var(--pri)}
.trta{min-height:80px}
.clbl{font-size:.8rem;color:var(--sub);margin:8px 0 4px}
.aibtn{font-size:.72rem;font-weight:700;color:var(--pri);background:var(--pri-l);border:1px solid var(--pri);border-radius:6px;padding:3px 10px;cursor:pointer}
.aibtn:disabled{opacity:.5;cursor:default}

/* 全体所感 */
.oasec h3{font-size:.95rem;margin-bottom:8px}

/* ボタン */
.bg{display:flex;gap:10px;margin:16px 0}
.b{flex:1;padding:14px;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s}
.b:active{transform:scale(.97)}
.b1{background:var(--pri);color:#fff}.b1:hover{background:var(--pri-d)}
.b2{background:#fff;color:var(--s1);border:2px solid var(--s1)}
.b3{background:var(--pri-l);color:var(--pri-d)}
.b4{background:#fff3e0;color:var(--s2);border:2px solid var(--s2)}

/* トースト */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:12px 24px;border-radius:24px;font-size:.9rem;font-weight:600;opacity:0;transition:all .3s;z-index:400;pointer-events:none;white-space:nowrap;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* リスト（採点待ち/履歴） */
.hctrl{display:flex;gap:8px;margin-bottom:16px}
.hctrl select{flex:1;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:.9rem;background:#fff;outline:0}
.hlist{display:flex;flex-direction:column;gap:8px}
.hi{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.hi:active{background:var(--pri-l)}
.hi .hii{flex:1;min-width:0}
.hi .hid{font-size:.8rem;color:var(--sub)}
.hi .hin{font-weight:700;font-size:.95rem}
.hi .hia{font-size:1.3rem;font-weight:700;color:var(--pri);min-width:46px;text-align:right}
.badge{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px}
.badge.rec{background:#fff3e0;color:var(--s2)}
.badge.scored{background:#e8f5e9;color:var(--s5)}

/* モーダル */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:300;overflow-y:auto;padding:24px 12px}
.mo.show{display:block}
.mc{background:#fff;border-radius:16px;max-width:560px;margin:0 auto;padding:20px 16px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bdr)}
.mh h3{font-size:1rem}
.mx{background:0;border:0;font-size:1.5rem;cursor:pointer;padding:4px 8px;color:var(--sub)}
.di{padding:10px 0;border-bottom:1px solid #f0f0f0}.di:last-of-type{border-bottom:none}
.dih{display:flex;justify-content:space-between;align-items:center;gap:8px}
.din{font-weight:600;font-size:.9rem}
.dis{font-weight:700;font-size:1rem;padding:2px 10px;border-radius:6px;color:#fff;flex-shrink:0}
.ditr{font-size:.84rem;color:var(--txt);margin-top:4px;white-space:pre-wrap}
.dic{font-size:.84rem;color:var(--sub);margin-top:4px}
.dov{margin-top:12px;padding:12px;background:var(--pri-l);border-radius:8px;font-size:.9rem}
.ma{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)}
.sb5{background:var(--s5)}.sb4{background:var(--s4)}.sb3{background:var(--s3)}.sb2{background:var(--s2)}.sb1{background:var(--s1)}

/* グラフ */
.chc{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--sh)}
.chc select{width:100%;padding:10px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:.9rem;background:#fff;outline:0}
.chb{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--sh)}
.chb h3{font-size:.9rem;margin-bottom:12px;color:var(--sub)}
.chb canvas{width:100%!important;max-height:300px}
.nd{text-align:center;color:var(--sub);padding:40px 16px;font-size:.95rem}

/* 設定画面 */
.cfg-sec{margin-bottom:24px}
.cfg-sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cfg-sec-hdr input{flex:1;font-size:.95rem;font-weight:700;padding:8px 10px;border:1px solid var(--bdr);border-radius:8px;outline:0;color:var(--pri-d)}
.cfg-sec-hdr input:focus{border-color:var(--pri)}
.cfg-item{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;box-shadow:var(--sh);border-left:3px solid var(--pri)}
.cfg-item .ci-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.cfg-item input{flex:1;padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:.9rem;outline:0}
.cfg-item input:focus{border-color:var(--pri)}
.cfg-item textarea{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:6px;font-size:.85rem;font-family:inherit;resize:vertical;min-height:48px;outline:0;color:var(--sub)}
.cfg-item textarea:focus{border-color:var(--pri)}
.ci-btns{display:flex;gap:4px;flex-shrink:0}
.ci-btns button{width:36px;height:36px;border:1px solid var(--bdr);border-radius:8px;background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;color:var(--sub);transition:all .15s}
.ci-btns button:hover{background:var(--pri-l);color:var(--pri-d);border-color:var(--pri)}
.ci-btns button.del:hover{background:#fef0f0;color:var(--s1);border-color:var(--s1)}
.cfg-add{display:flex;gap:8px;margin-top:8px}
.cfg-add button{flex:1;padding:10px;border:2px dashed var(--bdr);border-radius:var(--r);background:0;font-size:.85rem;font-weight:600;color:var(--sub);cursor:pointer}
.cfg-add button:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-l)}
.cfg-box{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:16px;box-shadow:var(--sh)}
.cfg-box h3{font-size:.95rem;color:var(--pri-d);margin-bottom:4px}
.cfg-box p{font-size:.78rem;color:var(--sub);margin-bottom:10px}
.cfg-box label{display:block;font-size:.8rem;font-weight:600;color:var(--sub);margin:8px 0 3px}
.cfg-box input{width:100%;padding:9px 11px;border:1px solid var(--bdr);border-radius:8px;font-size:.9rem;outline:0}
.cfg-box input:focus{border-color:var(--pri)}

.qc.warn{border-left-color:var(--s1);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@media(min-width:640px){.pg{padding:24px}.sb{min-height:52px;font-size:1.2rem}}
</style>
</head>
<body>

<header class="hdr">
  <div style="width:96px"></div>
  <h1 data-t="appTitle">口頭試問 評価システム</h1>
  <div class="lsw">
    <button class="on" onclick="setLang('ja')">JP</button>
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('vi')">VI</button>
    <button onclick="setLang('id')">ID</button>
  </div>
</header>

<!-- 試問（録音） -->
<div id="pgExam" class="pg on">
  <div class="cd meta">
    <label data-t="labelDate">試問日</label>
    <input type="date" id="fDate">
    <label data-t="labelExaminer">試問者名</label>
    <input type="text" id="fEr" data-ph="phEr" placeholder="例：山田太郎">
    <label data-t="labelExaminee">受験者名</label>
    <input type="text" id="fEe" data-ph="phEe" placeholder="例：佐藤花子">
  </div>
  <div id="examCards"></div>
  <div class="bg">
    <button class="b b1" onclick="saveSession()" data-t="btnSaveSession">試問を保存</button>
    <button class="b b2" onclick="resetExam()" data-t="btnReset">リセット</button>
  </div>
</div>

<!-- 採点 -->
<div id="pgScore" class="pg">
  <div class="hctrl">
    <select id="scFil" onchange="drawScoreList()">
      <option value="" data-t="filterUnscored">採点待ち</option>
      <option value="all" data-t="filterAll">すべて</option>
    </select>
  </div>
  <div id="scList" class="hlist"></div>
  <div id="scDetail" style="display:none"></div>
</div>

<!-- 履歴 -->
<div id="pgHi" class="pg">
  <div class="hctrl">
    <select id="hFil" onchange="drawHist()"><option value="" data-t="filterAllEe">全員</option></select>
    <button class="b b3" onclick="doCSV()" style="flex:0 0 auto;padding:10px 16px;font-size:.85rem" data-t="btnCSV">CSV出力</button>
  </div>
  <div id="hList" class="hlist"></div>
</div>

<!-- グラフ -->
<div id="pgCh" class="pg">
  <div class="chc">
    <label style="font-size:.85rem;font-weight:600;color:var(--sub);display:block;margin-bottom:6px" data-t="selEe">受験者を選択</label>
    <select id="chSel" onchange="drawCharts()"><option value="" data-t="selPh">-- 選択してください --</option></select>
  </div>
  <div id="chArea">
    <div class="chb"><h3 data-t="chLine">平均点の推移</h3><canvas id="cvL"></canvas></div>
    <div class="chb"><h3 data-t="chRadar">項目別レーダーチャート（直近）</h3><canvas id="cvR"></canvas></div>
  </div>
  <div id="chNone" class="nd" style="display:none"></div>
</div>

<!-- 設定 -->
<div id="pgCfg" class="pg">
  <div class="cfg-box">
    <h3 data-t="sttTitle">AI文字起こし設定（任意）</h3>
    <p data-t="sttNote">録音した音声を自動で文字起こしするための外部API設定です。未設定でも、録音中の自動文字起こし（ブラウザ）と手入力で利用できます。キーはこの端末内にのみ保存されます。</p>
    <label data-t="sttEndpoint">エンドポイントURL</label>
    <input type="text" id="sttEndpoint" placeholder="https://api.openai.com/v1/audio/transcriptions">
    <label data-t="sttModel">モデル名</label>
    <input type="text" id="sttModel" placeholder="whisper-1">
    <label data-t="sttKey">APIキー</label>
    <input type="password" id="sttKey" placeholder="sk-...">
    <button class="b b1" style="width:100%;margin-top:12px" onclick="saveStt()" data-t="sttSave">API設定を保存</button>
  </div>
  <div class="stit" data-t="cfgItemsTitle">試問項目</div>
  <div id="cfgArea"></div>
  <div class="cfg-add">
    <button onclick="addSection()" data-t="addSec">＋ セクション追加</button>
  </div>
  <div style="margin-top:24px">
    <button class="b b1" style="width:100%" onclick="saveCfg()" data-t="saveCfg">項目を保存</button>
  </div>
  <div style="margin-top:12px">
    <button class="b b2" style="width:100%" onclick="resetCfg()" data-t="resetCfg">初期設定に戻す</button>
  </div>
</div>

<div class="mo" id="modal" onclick="if(event.target===this)closeMo()">
  <div class="mc" id="moBody"></div>
</div>
<div class="toast" id="toast"></div>

<!-- タブ -->
<nav class="tabs">
  <button class="on" data-pg="pgExam" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
    <span data-t="tabExam">試問</span>
  </button>
  <button data-pg="pgScore" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    <span data-t="tabScore">採点</span>
  </button>
  <button data-pg="pgHi" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    <span data-t="tabHi">履歴</span>
  </button>
  <button data-pg="pgCh" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
    <span data-t="tabCh">グラフ</span>
  </button>
  <button data-pg="pgCfg" onclick="swTab(this)">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
    <span data-t="tabCfg">設定</span>
  </button>
</nav>

<script>
/* ==============================================================
   多言語（UIテキストのみ。試問項目はcfgに保存）
   ============================================================== */
const TX={
ja:{appTitle:'口頭試問 評価システム',tabExam:'試問',tabScore:'採点',tabHi:'履歴',tabCh:'グラフ',tabCfg:'設定',
labelDate:'試問日',labelExaminer:'試問者名',labelExaminee:'受験者名',phEr:'例：山田太郎',phEe:'例：佐藤花子',
recStart:'録音',recStop:'停止',recRedo:'録り直し',recReady:'未録音',recDone:'録音済み',recPlayHint:'再生して内容を確認できます',
liveLbl:'自動文字起こし（録音中・下書き）',micErr:'マイクにアクセスできません。ブラウザの権限を確認してください',recOther:'別の項目を録音中です',

/* ==============================================================
   グローバル状態・キー
   ============================================================== */
const SKEY='oral_exam_sessions_v1';
const CKEY='oral_exam_items_v1';
const LKEY='oral_exam_lang';
const STTKEY='oral_exam_stt_v1';
const DRAFTKEY='oral_exam_draft_v1';
const DBNAME='oralExamDB',STORE='audio';

let lang=localStorage.getItem(LKEY)||'ja';
let cfg=loadCfg();
let cur=null;            // 現在編集中の試問セッション（試問タブ）
let active=null;         // 録音中の状態 {itemId,mr,stream,chunks,rec,draft,timer,t0}
let curScore=null;       // 採点中のセッション
let curScoreUrls=[];     // 採点画面で作成したObjectURL（破棄用）

function t(k){return(TX[lang]||TX.ja)[k]||TX.ja[k]||k}
function loadCfg(){try{const r=localStorage.getItem(CKEY);return r?JSON.parse(r):defaultCfg()}catch{return defaultCfg()}}
function getItems(){return cfg.items}
function getSections(){return cfg.sections}
function getAll(){try{const r=localStorage.getItem(SKEY);return r?JSON.parse(r).sessions||[]:[]}catch{return[]}}
function saveAll(arr){localStorage.setItem(SKEY,JSON.stringify({sessions:arr}))}
function getStt(){try{return JSON.parse(localStorage.getItem(STTKEY))||{}}catch{return{}}}

/* ==============================================================
   IndexedDB（音声Blob保存）
   ============================================================== */
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db);
    const r=indexedDB.open(DBNAME,1);
    r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(STORE))r.result.createObjectStore(STORE)};
    r.onsuccess=()=>{_db=r.result;res(_db)};
    r.onerror=()=>rej(r.error);
  });
}
async function putAudio(key,blob){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(blob,key);tx.oncomplete=()=>res();tx.onerror=()=>rej(tx.error)})}
async function getAudio(key){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const rq=tx.objectStore(STORE).get(key);rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>rej(rq.error)})}
async function delAudio(key){const db=await openDB();return new Promise((res)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(key);tx.oncomplete=()=>res();tx.onerror=()=>res()})}

/* ==============================================================
   言語
   ============================================================== */
function setLang(l){
  lang=l;localStorage.setItem(LKEY,l);document.documentElement.lang=l;
  document.querySelectorAll('.lsw button').forEach(b=>b.classList.toggle('on',b.textContent.trim()==={ja:'JP',en:'EN',vi:'VI',id:'ID'}[l]));
  applyT();buildExamCards();buildCfgUI();
  // 開いている採点画面・一覧を再描画
  if(document.getElementById('pgScore').classList.contains('on')){if(curScore){openScore(curScore.id)}else{drawScoreList()}}
}
function applyT(){
  document.querySelectorAll('[data-t]').forEach(el=>{el.textContent=t(el.dataset.t)});
  document.querySelectorAll('[data-ph]').forEach(el=>{el.placeholder=t(el.dataset.ph)});
}
function speechLang(){return{ja:'ja-JP',en:'en-US',vi:'vi-VN',id:'id-ID'}[lang]||'ja-JP'}

/* ==============================================================
   初期化
   ============================================================== */
document.addEventListener('DOMContentLoaded',()=>{
  restoreDraftOrNew();
  document.getElementById('fDate').value=cur.date||new Date().toISOString().split('T')[0];
  document.getElementById('fEr').value=cur.examiner||'';
  document.getElementById('fEe').value=cur.examinee||'';
  ['fDate','fEr','fEe'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{if(cur){cur.date=document.getElementById('fDate').value;cur.examiner=document.getElementById('fEr').value;cur.examinee=document.getElementById('fEe').value;saveDraft()}}));
  const s=getStt();
  document.getElementById('sttEndpoint').value=s.endpoint||'';
  document.getElementById('sttModel').value=s.model||'';
  document.getElementById('sttKey').value=s.key||'';
  setLang(lang);
  window.addEventListener('beforeunload',e=>{if(active){e.preventDefault();e.returnValue=''}});
});

function newSession(){
  cur={id:crypto.randomUUID(),date:new Date().toISOString().split('T')[0],examiner:'',examinee:'',items:{},overall:'',status:'rec',createdAt:new Date().toISOString()};
}
function restoreDraftOrNew(){
  try{
    const d=JSON.parse(localStorage.getItem(DRAFTKEY));
    // 録音済み項目を含む下書きのみ復元（保存済みセッションと重複しないもの）
    if(d&&d.id&&d.items&&Object.values(d.items).some(x=>x&&x.hasAudio)&&!getAll().some(s=>s.id===d.id)){cur=d;return}
  }catch(e){}
  newSession();
}
function saveDraft(){if(cur)localStorage.setItem(DRAFTKEY,JSON.stringify(cur))}

/* ==============================================================
   試問タブ：カード生成
   ============================================================== */
function buildExamCards(){
  const el=document.getElementById('examCards');
  const secs=getSections(),items=getItems();
  let h='';
  secs.forEach(sec=>{
    const secItems=items.filter(it=>it.secId===sec.id);
    if(!secItems.length)return;
    h+=`<div class="stit">${esc(sec.name)}</div>`;
    secItems.forEach((it,ii)=>{
      const rec=cur&&cur.items[it.id];
      const has=rec&&rec.hasAudio;
      h+=`<div class="cd qc${has?' done':''}" id="q-${it.id}">
        <div class="en">${esc(sec.name.charAt(0))}-${ii+1}</div>
        <div class="enm">${esc(it.name)}</div>
        <div class="ed">${esc(it.desc)}</div>
        <div class="recrow">
          <button class="recbtn" id="rb-${it.id}" onclick="toggleRec('${it.id}')"><span class="dot"></span><span class="rlab">${has?t('recRedo'):t('recStart')}</span></button>
          <span class="rectime" id="rt-${it.id}"></span>
          <span class="recstat${has?' ok':''}" id="rs-${it.id}">${has?'● '+t('recDone'):t('recReady')}</span>
        </div>
        <audio id="au-${it.id}" controls style="display:${has?'block':'none'}"></audio>
        <div class="live" id="lv-${it.id}" style="display:${(rec&&rec.draft)?'block':'none'}"><span class="lbl">${t('liveLbl')}</span><span class="lvtxt">${esc(rec?rec.draft:'')}</span></div>
      </div>`;
    });
  });
  el.innerHTML=h;
  // 既存録音の再生用URLを復元
  if(cur)getItems().forEach(async it=>{
    if(cur.items[it.id]&&cur.items[it.id].hasAudio){
      const b=await getAudio(cur.id+'_'+it.id);
      if(b){const au=document.getElementById('au-'+it.id);if(au){au.src=URL.createObjectURL(b);au.style.display='block'}}
    }
  });
}

/* ==============================================================
   録音（MediaRecorder + Web Speech API）
   ============================================================== */
async function toggleRec(itemId){
  if(active&&active.itemId===itemId){await stopRec();return}
  if(active){toast(t('recOther'),1);return}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true})}
  catch(e){toast(t('micErr'),1);return}
  let mime='';
  if(window.MediaRecorder){
    if(MediaRecorder.isTypeSupported('audio/webm'))mime='audio/webm';
    else if(MediaRecorder.isTypeSupported('audio/mp4'))mime='audio/mp4';
  }
  const mr=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
  const chunks=[];
  // active状態を先に作り、ハンドラからクロージャ経由で参照する（onstopは非同期で発火するため）
  const a={itemId,mr,stream,chunks,rec:null,draft:'',timer:null,t0:Date.now(),_resolve:null};
  mr.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks.push(e.data)};
  mr.onstop=async()=>{
    try{
      const blob=new Blob(chunks,{type:mr.mimeType||'audio/webm'});
      await putAudio(cur.id+'_'+itemId,blob);
      cur.items[itemId]=cur.items[itemId]||{};
      cur.items[itemId].hasAudio=true;
      cur.items[itemId].mime=blob.type;
      if(cur.items[itemId].draft==null)cur.items[itemId].draft='';
      saveDraft();
      const au=document.getElementById('au-'+itemId);
      if(au){au.src=URL.createObjectURL(blob);au.style.display='block'}
      const card=document.getElementById('q-'+itemId);if(card)card.classList.add('done');
      const rs=document.getElementById('rs-'+itemId);if(rs){rs.textContent='● '+t('recDone');rs.classList.add('ok')}
      const lv=document.getElementById('lv-'+itemId);
      if(lv){lv.querySelector('.lvtxt').textContent=cur.items[itemId].draft;lv.style.display=cur.items[itemId].draft?'block':'none'}
    }finally{if(a._resolve)a._resolve()}
  };
  // 自動文字起こし（ベストエフォート。Web Speech API対応ブラウザのみ）
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    try{
      const rec=new SR();rec.lang=speechLang();rec.continuous=true;rec.interimResults=true;
      rec.onresult=e=>{
        let fin='';
        for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript}
        if(fin){a.draft+=fin;updateLive(itemId,a.draft)}
      };
      rec.onerror=()=>{};
      rec.start();a.rec=rec;
    }catch(e){a.rec=null}
  }
  active=a;
  mr.start();
  // UI
  const btn=document.getElementById('rb-'+itemId);
  btn.classList.add('recording');btn.querySelector('.rlab').textContent=t('recStop');
  const lv=document.getElementById('lv-'+itemId);if(lv){lv.style.display='block';lv.querySelector('.lvtxt').textContent=''}
  a.timer=setInterval(()=>{
    const s=Math.floor((Date.now()-a.t0)/1000);
    const rt=document.getElementById('rt-'+itemId);if(rt)rt.textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  },250);
}
function updateLive(itemId,txt){const lv=document.getElementById('lv-'+itemId);if(lv)lv.querySelector('.lvtxt').textContent=txt}
function stopRec(){
  if(!active)return Promise.resolve();
  const a=active;const itemId=a.itemId;
  clearInterval(a.timer);
  // 自動文字起こしの下書きを確定（onstopが発火する前にactiveがnullになるため、ここで保存）
  cur.items[itemId]=cur.items[itemId]||{};
  cur.items[itemId].draft=(a.draft||'').trim();
  const p=new Promise(res=>{a._resolve=res});
  try{a.mr.stop()}catch(e){if(a._resolve)a._resolve()}
  try{if(a.rec)a.rec.stop()}catch(e){}
  a.stream.getTracks().forEach(tr=>tr.stop());
  const btn=document.getElementById('rb-'+itemId);
  if(btn){btn.classList.remove('recording');btn.querySelector('.rlab').textContent=t('recRedo')}
  const rt=document.getElementById('rt-'+itemId);if(rt)rt.textContent='';
  active=null;
  return p;
}

/* ==============================================================
   試問の保存・リセット
   ============================================================== */
async function saveSession(){
  if(active)await stopRec();
  cur.date=document.getElementById('fDate').value;
  cur.examiner=document.getElementById('fEr').value.trim();
  cur.examinee=document.getElementById('fEe').value.trim();
  if(!cur.examiner||!cur.examinee){toast(t('eNm'),1);return}
  if(!cur.date){toast(t('eDt'),1);return}
  const recd=getItems().some(it=>cur.items[it.id]&&cur.items[it.id].hasAudio);
  if(!recd){toast(t('eNoRec'),1);return}
  const all=getAll();
  const idx=all.findIndex(s=>s.id===cur.id);
  cur.updatedAt=new Date().toISOString();
  if(idx>=0)all[idx]=cur;else all.push(cur);
  saveAll(all);
  localStorage.removeItem(DRAFTKEY);
  toast(t('tSaved'));
  newSession();
  document.getElementById('fEr').value='';document.getElementById('fEe').value='';
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  buildExamCards();refreshSel();
}
async function resetExam(){
  if(!confirm(t('cReset')))return;
  if(active)await stopRec();
  // 未保存セッションの音声を破棄
  const saved=getAll().some(s=>s.id===cur.id);
  if(!saved)getItems().forEach(it=>{if(cur.items[it.id]&&cur.items[it.id].hasAudio)delAudio(cur.id+'_'+it.id)});
  newSession();
  document.getElementById('fEr').value='';document.getElementById('fEe').value='';
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  localStorage.removeItem(DRAFTKEY);
  buildExamCards();
  toast(t('tReset'));
}

async function openScore(id){

  releaseScoreUrls();
  document.getElementById('scList').style.display='none';
  document.querySelector('#pgScore .hctrl').style.display='none';

  const secs=getSections(),items=getItems();
  let h=`<div class="cd meta"><div style="font-size:.85rem;color:var(--sub)">${r.date}　${t('erLbl')}: ${esc(r.examiner)}</div><div style="font-size:1.1rem;font-weight:700;margin-top:2px">${esc(r.examinee)}</div></div>`;
  secs.forEach(sec=>{
    const secItems=items.filter(it=>it.secId===sec.id);

    h+=`<div class="stit">${esc(sec.name)}</div>`;

      const rec=r.items[it.id]||{};

      h+=`<div class="cd qc${sc?' scored':''}" id="sc-${it.id}">
        <div class="en">${esc(sec.name.charAt(0))}-${ii+1}</div>

        <div class="tlbl"><span>${t('trLbl')}</span>${rec.hasAudio?`<button class="aibtn" id="ai-${it.id}" onclick="aiTranscribe('${it.id}')">${t('aiBtn')}</button>`:''}</div>
        <textarea class="trta" id="tr-${it.id}" placeholder="${t('phTr')}">${esc(rec.transcript!=null?rec.transcript:(rec.draft||''))}</textarea>
        <div class="tlbl">${t('scoreLbl')}</div>
        <div class="sr">${[1,2,3,4,5].map(s=>`<button class="sb${sc===s?' sel':''}" data-id="${it.id}" data-s="${s}" onclick="pickScore('${it.id}',${s},this)">${s}<span class="sl">${t('s'+s)}</span></button>`).join('')}</div>
        <div class="clbl">${t('cmtLbl')}</div>
        <textarea id="cm-${it.id}" placeholder="${t('phCmt')}">${esc(rec.comment||'')}</textarea>
      </div>`;
    });
  });
  h+=`<div class="cd oasec"><h3>${t('overall')}</h3><textarea id="scOv" class="oata" rows="4" placeholder="${t('phOv')}">${esc(r.overall||'')}</textarea></div>`;
  h+=`<div class="bg"><button class="b b1" onclick="saveScore()">${t('btnSaveScore')}</button><button class="b b3" onclick="backToScoreList()">${t('btnBack')}</button></div>`;
  det.innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
  // 音声URL
  for(const it of items){
    if(r.items[it.id]&&r.items[it.id].hasAudio){
      const b=await getAudio(r.id+'_'+it.id);

function pickScore(id,s,btn){btn.parentElement.querySelectorAll('.sb').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');const c=document.getElementById('sc-'+id);if(c)c.classList.add('scored')}
function backToScoreList(){curScore=null;releaseScoreUrls();document.getElementById('scDetail').style.display='none';drawScoreList()}
function releaseScoreUrls(){curScoreUrls.forEach(u=>{try{URL.revokeObjectURL(u)}catch(e){}});curScoreUrls=[]}

async function aiTranscribe(itemId){
  const s=getStt();
  if(!s.key||!s.endpoint){toast(t('aiNoCfg'),1);return}
  const blob=await getAudio(curScore.id+'_'+itemId);
  if(!blob){toast(t('aiNoAudio'),1);return}
  const btn=document.getElementById('ai-'+itemId);
  const old=btn.textContent;btn.disabled=true;btn.textContent=t('aiRun');
  try{
    const fd=new FormData();
    const ext=(blob.type.indexOf('mp4')>=0)?'mp4':'webm';
    fd.append('file',blob,'audio.'+ext);
    fd.append('model',s.model||'whisper-1');
    const langCode={ja:'ja',en:'en',vi:'vi',id:'id'}[lang];if(langCode)fd.append('language',langCode);
    const res=await fetch(s.endpoint,{method:'POST',headers:{'Authorization':'Bearer '+s.key},body:fd});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const j=await res.json();
    const txt=j.text||j.transcript||'';
    document.getElementById('tr-'+itemId).value=txt;
    toast(t('aiDone'));
  }catch(e){toast(t('aiFail')+'（'+e.message+'）',1)}
  finally{btn.disabled=false;btn.textContent=old}
}

function saveScore(){
  const r=curScore;if(!r)return;
  const items=getItems();
  const miss=[];
  items.forEach(it=>{
    const rec=r.items[it.id]||{};
    if(!rec.hasAudio)return; // 録音のない項目は採点対象外
    const sel=document.querySelector('.sb[data-id="'+it.id+'"].sel');
    if(!sel)miss.push(it);
  });
  if(miss.length){
    miss.forEach(it=>{const c=document.getElementById('sc-'+it.id);if(c){c.classList.add('warn');setTimeout(()=>c.classList.remove('warn'),1000)}});
    toast(t('eScore')+'（'+miss.length+'）',1);
    const f=document.getElementById('sc-'+miss[0].id);if(f)f.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  items.forEach(it=>{
    r.items[it.id]=r.items[it.id]||{};
    const tr=document.getElementById('tr-'+it.id);if(tr)r.items[it.id].transcript=tr.value;
    const cm=document.getElementById('cm-'+it.id);if(cm)r.items[it.id].comment=cm.value;
    const sel=document.querySelector('.sb[data-id="'+it.id+'"].sel');
    r.items[it.id].score=sel?+sel.dataset.s:null;
  });
  r.overall=document.getElementById('scOv').value;
  r.status='scored';
  r.updatedAt=new Date().toISOString();
  const all=getAll();const idx=all.findIndex(s=>s.id===r.id);if(idx>=0)all[idx]=r;else all.push(r);
  saveAll(all);
  toast(t('tScored'));
  curScore=null;releaseScoreUrls();
  document.getElementById('scDetail').style.display='none';
  drawScoreList();refreshSel();
}

  }

function doDel(id){

function doCSV(){
  const all=getAll(),items=getItems();if(!all.length){toast(t('noData'),1);return}
  const hd=['試問日','試問者','受験者','状態',...items.map(it=>it.name+'(点)'),...items.map(it=>it.name+'(文字起こし)'),...items.map(it=>it.name+'(コメント)'),'平均点','全体所感','作成日時'];

function buildCfgUI(){
  const area=document.getElementById('cfgArea');
  const secs=cfg.sections,items=cfg.items;let h='';
  secs.forEach((sec,si)=>{
    const secItems=items.filter(it=>it.secId===sec.id);
    h+=`<div class="cfg-sec" data-sec="${sec.id}">`;
    h+=`<div class="cfg-sec-hdr">
      <input type="text" value="${esc(sec.name)}" onchange="cfgSecName('${sec.id}',this.value)" placeholder="${t('secName')}">
      <div class="ci-btns">
        ${si>0?`<button onclick="moveSec('${sec.id}',-1)">&#9650;</button>`:'<button style="visibility:hidden">&#9650;</button>'}
        ${si<secs.length-1?`<button onclick="moveSec('${sec.id}',1)">&#9660;</button>`:'<button style="visibility:hidden">&#9660;</button>'}
        <button class="del" onclick="delSec('${sec.id}')">&#10005;</button>
      </div>
    </div>`;
    secItems.forEach((it,ii)=>{
      h+=`<div class="cfg-item">
        <div class="ci-row">
          <input type="text" value="${esc(it.name)}" onchange="cfgItemName('${it.id}',this.value)" placeholder="${t('itemName')}">
          <div class="ci-btns">
            ${ii>0?`<button onclick="moveItem('${it.id}',-1)">&#9650;</button>`:'<button style="visibility:hidden">&#9650;</button>'}
            ${ii<secItems.length-1?`<button onclick="moveItem('${it.id}',1)">&#9660;</button>`:'<button style="visibility:hidden">&#9660;</button>'}
            <button class="del" onclick="delItem('${it.id}')">&#10005;</button>
          </div>
        </div>
        <textarea onchange="cfgItemDesc('${it.id}',this.value)" placeholder="${t('itemDesc')}">${esc(it.desc)}</textarea>
      </div>`;
    });
    h+=`<div class="cfg-add"><button onclick="addItem('${sec.id}')">${t('addItem')}</button></div>`;
    h+=`</div>`;
  });
  area.innerHTML=h;
}
function cfgSecName(secId,val){const s=cfg.sections.find(s=>s.id===secId);if(s)s.name=val}
function cfgItemName(itemId,val){const it=cfg.items.find(i=>i.id===itemId);if(it)it.name=val}
function cfgItemDesc(itemId,val){const it=cfg.items.find(i=>i.id===itemId);if(it)it.desc=val}
function addSection(){cfg.sections.push({id:'sec_'+Date.now(),name:t('secName')});buildCfgUI()}
function addItem(secId){
  const id='item_'+Date.now();
  const idxs=cfg.items.map((it,i)=>it.secId===secId?i:-1).filter(i=>i>=0);
  const at=idxs.length?idxs[idxs.length-1]+1:cfg.items.length;
  cfg.items.splice(at,0,{id,secId,name:'',desc:''});
  buildCfgUI();
  setTimeout(()=>{const ins=document.querySelectorAll('.cfg-item input[type="text"]');if(ins.length)ins[ins.length-1].focus()},50);
}
function delSec(secId){if(!confirm('このセクションと全質問を削除しますか？'))return;cfg.sections=cfg.sections.filter(s=>s.id!==secId);cfg.items=cfg.items.filter(it=>it.secId!==secId);buildCfgUI()}
function delItem(itemId){cfg.items=cfg.items.filter(it=>it.id!==itemId);buildCfgUI()}
function moveSec(secId,dir){const i=cfg.sections.findIndex(s=>s.id===secId);if(i<0)return;const j=i+dir;if(j<0||j>=cfg.sections.length)return;[cfg.sections[i],cfg.sections[j]]=[cfg.sections[j],cfg.sections[i]];buildCfgUI()}
function moveItem(itemId,dir){
  const secId=cfg.items.find(it=>it.id===itemId)?.secId;if(!secId)return;
  const secItems=cfg.items.filter(it=>it.secId===secId);
  const li=secItems.findIndex(it=>it.id===itemId);const sj=li+dir;
  if(sj<0||sj>=secItems.length)return;
  const gi=cfg.items.indexOf(secItems[li]),gj=cfg.items.indexOf(secItems[sj]);
  [cfg.items[gi],cfg.items[gj]]=[cfg.items[gj],cfg.items[gi]];buildCfgUI();
}
function saveCfg(){localStorage.setItem(CKEY,JSON.stringify(cfg));buildExamCards();toast(t('cfgSaved'))}
function resetCfg(){if(!confirm(t('cResetCfg')))return;cfg=defaultCfg();localStorage.setItem(CKEY,JSON.stringify(cfg));buildCfgUI();buildExamCards();toast(t('cfgReset'))}

/* ==============================================================
   ユーティリティ
   ============================================================== */
function toast(msg,err){const el=document.getElementById('toast');el.textContent=msg;el.style.background=err?'#d32f2f':'#333';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600)}
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
